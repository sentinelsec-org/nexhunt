KEYGEN_POLICY_ID  = "b216c614-6942-42da-b044-a25fbceb2ed5"
# LemonSqueezy (fallback)
LEMON_STORE_ID = "7372172"

[[kv_namespaces]]
binding = "LICENSE_CACHE"
